name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE_NAME: ${{ github.repository_owner }}/vibe-kanban-server
  WRAPPER_IMAGE_NAME: ${{ github.repository_owner }}/vibe-kanban-cloud

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout upstream BloopAI/vibe-kanban
        uses: actions/checkout@v4
        with:
          repository: BloopAI/vibe-kanban
          path: upstream

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push remote-server
        uses: docker/build-push-action@v5
        with:
          context: ./upstream
          file: ./upstream/crates/remote/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest

      - name: Build and push DinD Wrapper
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.WRAPPER_IMAGE_NAME }}:latest