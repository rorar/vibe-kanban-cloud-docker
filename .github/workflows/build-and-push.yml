name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 */6 * * *' # Check for updates every 6 hours
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE_NAME: ${{ github.repository_owner }}/vibe-kanban-server
  WRAPPER_IMAGE_NAME: ${{ github.repository_owner }}/vibe-kanban-cloud

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout upstream BloopAI/vibe-kanban
        uses: actions/checkout@v4
        with:
          repository: BloopAI/vibe-kanban
          path: upstream

      - name: Sync versions and check for updates
        id: check_updates
        run: |
          UPSTREAM_COMPOSE="./upstream/crates/remote/docker-compose.yml"
          OUR_COMPOSE="./docker-compose.yml"
          
          # Extract versions from compose
          CADDY_IMG=$(grep -oP 'image:\s*\Kcaddy:[^\s]+' "$UPSTREAM_COMPOSE" | head -1)
          PG_IMG=$(grep -oP 'image:\s*\Kpostgres:[^\s]+' "$UPSTREAM_COMPOSE" | head -1)
          ELEC_IMG=$(grep -oP 'image:\s*\Kelectricsql/electric:[^\s]+' "$UPSTREAM_COMPOSE" | head -1)
          
          echo "Upstream versions -> Caddy: $CADDY_IMG, Postgres: $PG_IMG, Electric: $ELEC_IMG"
          
          # Replace in our compose file
          sed -i "s|image: caddy:.*|image: $CADDY_IMG|g" "$OUR_COMPOSE"
          sed -i "s|image: postgres:.*|image: $PG_IMG|g" "$OUR_COMPOSE"
          sed -i "s|image: electricsql/electric:.*|image: $ELEC_IMG|g" "$OUR_COMPOSE"
          
          # Get upstream latest tag
          UPSTREAM_TAG=$(gh api repos/BloopAI/vibe-kanban/releases/latest --jq '.tag_name' || echo "latest")
          echo "Upstream latest tag: $UPSTREAM_TAG"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          
          # Track upstream commit to trigger build when upstream code changes
          cd upstream
          UPSTREAM_SHA=$(git rev-parse HEAD)
          cd ..
          
          touch .upstream_sha
          PREV_SHA=$(cat .upstream_sha)
          
          # Check if our compose file was modified
          git diff --quiet "$OUR_COMPOSE" || HAS_DEPS_CHANGED=true
          
          # Weekly force build on Sundays between 00:00 and 06:00
          if [ "$(date +%u)" == "7" ] && [ "$(date +%H)" -lt "6" ]; then
            WEEKLY_FORCE=true
            echo "Weekly security rebuild triggered."
          fi
          
          if [ "$UPSTREAM_SHA" != "$PREV_SHA" ] || [ "$HAS_DEPS_CHANGED" = "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "push" ] || [ "$WEEKLY_FORCE" == "true" ]; then
            echo "Updates found, forced build, or weekly security rebuild."
            echo "$UPSTREAM_SHA" > .upstream_sha
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No updates found in upstream. Skipping build."
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to the Container registry
        if: steps.check_updates.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check_updates.outputs.build_needed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ env.WRAPPER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.check_updates.outputs.upstream_tag }}
            type=sha

      - name: Build and push remote-server
        if: steps.check_updates.outputs.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./upstream
          file: ./upstream/crates/remote/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:${{ steps.check_updates.outputs.upstream_tag }}

      - name: Build and push DinD Wrapper
        if: steps.check_updates.outputs.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WRAPPER_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.WRAPPER_IMAGE_NAME }}:${{ steps.check_updates.outputs.upstream_tag }}

      - name: Commit updated versions and SHA
        if: steps.check_updates.outputs.build_needed == 'true' && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml .upstream_sha
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: sync upstream dependencies and update to ${{ steps.check_updates.outputs.upstream_tag }} [skip ci]"
            git pull --rebase origin main
            
            # Create a local tag to match upstream
            TAG="${{ steps.check_updates.outputs.upstream_tag }}"
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag "$TAG"
              git push origin main --tags
            else
              git push origin main
            fi
          fi

      - name: Create GitHub Release
        if: steps.check_updates.outputs.build_needed == 'true' && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.check_updates.outputs.upstream_tag }}"
          echo "Creating GitHub Release for $TAG..."
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Release $TAG" \
            --notes "Automated build synced from upstream BloopAI/vibe-kanban $TAG. Includes True DinD wrapper and updated dependencies." \
            --verify-tag || echo "Release $TAG already exists or could not be created."